name: "RSVP to a this-week event"
url: "https://www.dev.brya.com"

turns:
  - send: "What events are taking place this week?"
    expect:
      judge: |
        The response should indicate that events are available this week — either
        by listing them in text, or by saying something like "here are events
        happening this week" (the events may be displayed as UI cards rather than
        inline text). A response that acknowledges events exist and presents them
        (even via cards) should PASS. Only FAIL if the bot says it has no
        information or refuses to answer. Today's date is {TODAY}.

  - send: "Please RSVP me to the first event you mentioned."
    expect:
      judge: |
        Two acceptable outcomes:

        1. The bot asks the user to confirm their RSVP to a specific named event
           before completing the action — it should name the event and seek a
           yes/no confirmation.

        2. The bot informs the user they are already RSVP'd / already attending
           the event — this is also acceptable and should PASS.

  - send: "yes"
    expect:
      judge: |
        Two acceptable outcomes:

        1. The RSVP was completed successfully — the response clearly states the
           user is now registered or signed up for the event, and ideally names it.

        2. The bot says the user is already attending / already registered for the
           event — in this case, verify that the named event appears in the
           following list of events the user has already RSVP'd to:
           {MY_EVENTS}
           If the bot claims the user is already attending but the event does NOT
           appear in that list, FAIL. If the event does appear, PASS.

        FAIL only if the response is ambiguous, says the RSVP failed for an
        unexpected reason, or claims already-attending without the event being
        in the MY_EVENTS list above.