name: "BRY-303: Chatbot confirms RSVP but user not registered to event"
description: |
  Status: Done — previously fixed, failure = regression.
  Chatbot confirms an RSVP was successful, but the user does not actually appear as
  registered — the event is missing from 'Your Attending' and the user is not listed
  as an attendee.

tags: [bug, done, rsvp]

setup:
  admin_clear: true

turns:
  - send: "What events are available for me to RSVP to this week?"
    critical: true
    expect:
      - judge: "Sage lists available events. FAIL if Sage says no events are available when {EVENTS} shows some."

  - send: "Please RSVP me to the first event you just listed."
    critical: true
    expect:
      - judge: "Sage confirms a successful RSVP to the event. FAIL if Sage errors or refuses."

  - send: "Now check my attending list — is that event actually registered?"
    expect:
      - judge: "Sage should confirm the event is in the user's attending list. Current attending: {MY_EVENTS}. FAIL if Sage said 'RSVP confirmed' earlier but {MY_EVENTS} does NOT contain that event, or if Sage now says the user is not registered — that mismatch is BRY-303."

  - send: "If someone looks at the event's attendee list, will they see my name there?"
    expect:
      - judge: "Sage should say yes and that should match {MY_EVENTS}. FAIL if Sage says yes but {MY_EVENTS} doesn't contain the event, or says no after confirming the RSVP — that's BRY-303."
