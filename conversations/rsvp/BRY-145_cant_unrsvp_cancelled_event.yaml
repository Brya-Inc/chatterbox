name: "BRY-145: Cannot un-RSVP from cancelled event — stuck in attending list permanently"
description: |
  Status: Done — previously fixed, failure = regression.
  When an event organizer cancels an event, users who RSVP'd should be able to un-RSVP
  or have it auto-removed. Bug: the cancelled event stays stuck in the attending list.
  This test uses two users: mike@brya.com creates and cancels the event,
  mikekutliroff.is13@gmail.com RSVPs and then tries to un-RSVP after cancellation.
  Any member can cancel their own events through the chat — not admin-only.

tags: [bug, done, rsvp]

setup:
  admin_clear: true

turns:
  # ── Phase 1: mike@brya.com creates an event ──
  - send: "Create an event called Test Cancellation Event for next week"
    expect:
      - judge: "Sage begins the event creation flow. FAIL only if Sage refuses or errors."

  - send: "Yes, confirm all the details and create it."
    expect:
      - judge: "Sage confirms the event was created or is in review. FAIL only if Sage errors."

  # ── Phase 2: Switch to mikekutliroff — log out, log in as different user ──
  - clear_cookies
  - navigate: "/login"
  - wait_for: "[placeholder='Enter email address']"
  - fill:
      selector: "[placeholder='Enter email address']"
      value: "mikekutliroff.is13@gmail.com"
  - press_key: "Enter"
  - wait: 2000
  - wait_for: "[placeholder='Enter password']"
  - fill:
      selector: "[placeholder='Enter password']"
      value: "Arianna148!"
  - press_key: "Enter"
  - wait: 3000

  # ── Phase 3: mikekutliroff RSVPs to the event ──
  - navigate: "/loggedInHome"
  - wait: 2000
  - click: "button[aria-label='Open chat with Sage'], button:has-text('Continue chat with Sage')"
  - wait_for: "[placeholder='Talk to Sage']"

  - send: "RSVP me to Test Cancellation Event"
    expect:
      - judge: "Sage finds the event and attempts to RSVP. FAIL only if Sage can't find the event at all."

  - send: "Yes, confirm."
    expect:
      - judge: "Sage confirms the RSVP. FAIL only if Sage errors."

  # ── Phase 4: Switch back to mike@brya.com and cancel the event ──
  - clear_cookies
  - navigate: "/login"
  - wait_for: "[placeholder='Enter email address']"
  - fill:
      selector: "[placeholder='Enter email address']"
      value: "mike@brya.com"
  - press_key: "Enter"
  - wait: 2000
  - wait_for: "[placeholder='Enter password']"
  - fill:
      selector: "[placeholder='Enter password']"
      value: "Arianna148!"
  - press_key: "Enter"
  - wait: 3000

  - navigate: "/loggedInHome"
  - wait: 2000
  - click: "button[aria-label='Open chat with Sage'], button:has-text('Continue chat with Sage')"
  - wait_for: "[placeholder='Talk to Sage']"

  - send: "Cancel the event called Test Cancellation Event. Delete it from the platform."
    expect:
      - judge: "Sage attempts to cancel/delete the event. FAIL only if Sage refuses entirely."

  - send: "Yes, I'm sure. Delete it."
    expect:
      - judge: "Sage confirms the event was cancelled/deleted. FAIL only if Sage errors."

  # ── Phase 5: Switch back to mikekutliroff and try to un-RSVP ──
  - clear_cookies
  - navigate: "/login"
  - wait_for: "[placeholder='Enter email address']"
  - fill:
      selector: "[placeholder='Enter email address']"
      value: "mikekutliroff.is13@gmail.com"
  - press_key: "Enter"
  - wait: 2000
  - wait_for: "[placeholder='Enter password']"
  - fill:
      selector: "[placeholder='Enter password']"
      value: "Arianna148!"
  - press_key: "Enter"
  - wait: 3000

  - navigate: "/loggedInHome"
  - wait: 2000
  - click: "button[aria-label='Open chat with Sage'], button:has-text('Continue chat with Sage')"
  - wait_for: "[placeholder='Talk to Sage']"

  # ── Phase 6: The actual bug test — can mikekutliroff un-RSVP? ──
  - send: "Show me my attending list. Am I still signed up for Test Cancellation Event?"
    expect:
      - judge: "Sage should either say the event was cancelled and removed from the list, or show that it's no longer there. FAIL if the cancelled event is still stuck in the attending list with no way to remove it — that's BRY-145."

  - send: "Remove Test Cancellation Event from my attending list."
    expect:
      - judge: "Sage should confirm it's removed or explain it was already auto-removed when cancelled. FAIL if Sage says it can't find the event while the user is still shown as attending — the stuck-RSVP contradiction is BRY-145."
