name: "BRY-125: Chatbot cannot cancel RSVPs in bulk"
description: |
  Status: Done — previously fixed, failure = regression.
  When asked to cancel all RSVPs, the chatbot lists the events, confirms, then contradicts
  itself by claiming it cannot locate them. Ends in an infinite loop with no cancellations.
  This test first RSVPs to two events, then attempts bulk cancellation.

tags: [bug, done, rsvp]

setup:
  admin_clear: true

turns:
  # Step 1: Find events to RSVP to.
  - send: "What events are happening this week?"
    critical: true
    expect:
      - judge: "Sage lists some upcoming events. FAIL only if Sage says there are no events at all."

  # Step 2: RSVP to the first event.
  - send: "RSVP me to the first event you just listed."
    critical: true
    expect:
      - judge: "Sage attempts to RSVP the user or asks for confirmation. FAIL only if Sage refuses entirely or errors."

  - send: "Yes, confirm."
    expect:
      - judge: "Sage confirms the RSVP or provides a status update. FAIL only if Sage errors."

  # Step 3: RSVP to a second event.
  - send: "Now RSVP me to the second event too."
    expect:
      - judge: "Sage attempts to RSVP the user to a second event. FAIL only if Sage refuses entirely or errors."

  - send: "Yes, confirm."
    expect:
      - judge: "Sage confirms the second RSVP or provides a status update. FAIL only if Sage errors."

  # Step 4: Verify we have RSVPs before attempting cancellation.
  - send: "Show me all the events I'm RSVP'd to."
    expect:
      - judge: "Sage should list the events the user just RSVP'd to. Current RSVPs per platform: {MY_EVENTS}. FAIL if Sage says there are no RSVPs when {MY_EVENTS} shows some."

  # Step 5: Now attempt bulk cancellation — this is where BRY-125 triggers.
  - send: "Cancel all my RSVPs."
    expect:
      - judge: "Sage should list the user's RSVPs and ask for confirmation before cancelling. FAIL if Sage contradicts itself by saying it can't find RSVPs it just listed."

  - send: "Yes, cancel all of them."
    expect:
      - judge: "Sage should execute the cancellations and confirm they're done. FAIL if Sage claims it cannot locate the events it just listed — that self-contradiction is BRY-125."

  # Step 6: Verify cancellations actually happened.
  - send: "Are my RSVPs cancelled now? Show me my attending list."
    expect:
      - judge: "Sage should confirm RSVPs are cancelled. Current RSVPs per platform: {MY_EVENTS}. FAIL if Sage gives a vague answer or loops back to asking which events to cancel."
