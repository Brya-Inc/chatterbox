name: "BRY-350: [Event RSVP] Chat fails to cancel RSVP and provides confusing manual workaround"
description: |
  Status: Backlog — not yet fixed, failure is expected.
  After confirming RSVP cancellation, the chat fails to execute it, asks intrusive emotional
  questions, and tells the user to cancel manually. Test first RSVPs to an event, then cancels.

tags: [bug, backlog, rsvp]

setup:
  admin_clear: true

turns:
  # Step 1: RSVP to an event first so we have something to cancel.
  - send: "What events are happening this week?"
    critical: true
    expect:
      - judge: "Sage lists upcoming events. FAIL only if no events at all."

  - send: "RSVP me to the first event you listed."
    critical: true
    expect:
      - judge: "Sage attempts to RSVP the user or asks for confirmation. FAIL only if Sage refuses entirely."

  - send: "Yes, confirm."
    expect:
      - judge: "Sage confirms the RSVP or provides a status. FAIL only if Sage errors."

  # Step 2: Verify we have the RSVP.
  - send: "What events am I signed up for?"
    expect:
      - judge: "Sage should list the event the user just RSVP'd to. Current RSVPs per platform: {MY_EVENTS}. FAIL if Sage says there are no RSVPs when {MY_EVENTS} shows some."

  # Step 3: Now try to cancel — this is where BRY-350 triggers.
  - send: "Please cancel my RSVP to the first event on that list."
    expect:
      - judge: "Sage should identify the event and ask for confirmation. FAIL if Sage says it cannot perform cancellations at all."

  - send: "Yes, please cancel it."
    expect:
      - judge: "Sage should execute the cancellation and confirm. FAIL if Sage asks for the 'exact event name' again, says 'I'm sorry to hear that', or tells the user to cancel manually via the website — those are BRY-350 symptoms."

  - send: "Can you confirm whether my RSVP was actually cancelled?"
    expect:
      - judge: "Sage should clearly state whether the RSVP was cancelled. Current RSVPs per platform: {MY_EVENTS}. FAIL if Sage is ambiguous, loops back to asking which event, or asks emotional questions like 'Is everything okay?'"
