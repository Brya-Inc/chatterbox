name: "BRY-194: Chat does not register RSVPs to event"
description: |
  Status: Done — previously fixed, failure = regression.
  Chatbot reports incorrect RSVP counts — says no attendees when there are some.
  This test first RSVPs to an event, then asks about attendee counts.

tags: [bug, done, rsvp]

setup:
  admin_clear: true

turns:
  # Step 1: Find an event and RSVP to it.
  - send: "What events are happening this week?"
    critical: true
    expect:
      - judge: "Sage lists upcoming events. FAIL only if Sage says there are no events at all."

  - send: "RSVP me to the first event you listed."
    critical: true
    expect:
      - judge: "Sage attempts to RSVP the user or asks for confirmation. FAIL only if Sage refuses entirely."

  - send: "Yes, confirm."
    expect:
      - judge: "Sage confirms the RSVP or provides a status. FAIL only if Sage errors."

  # Step 2: Verify the RSVP registered.
  - send: "What events am I attending? Please list them."
    expect:
      - judge: "Sage should list the event the user just RSVP'd to. Current RSVPs per platform: {MY_EVENTS}. FAIL if Sage says there are no RSVPs when {MY_EVENTS} shows some."

  # Step 3: Ask about attendee counts — this is where BRY-194 triggers.
  - send: "How many people are registered for that event?"
    expect:
      - judge: "Sage should give an attendee count of at least 1 (the user themselves). FAIL if Sage says 'no attendees' or '0 people' when the user just RSVP'd."

  - send: "Are you sure? Please double-check the attendee count."
    expect:
      - judge: "Sage should confirm or correct its count. FAIL if Sage reasserts 'no attendees' without actually rechecking — incorrect zero counts is BRY-194."
