name: "BRY-371: Back button from support chat navigates to wrong page and doesn't load"
description: |
  Status: Backlog — not yet fixed, failure is expected.
  Opening the support chat then pressing browser back navigates to a random previous URL
  (not the homepage) and the page doesn't actually reload its content.

tags: [bug, backlog, ui]

setup:
  fresh_chat: false

turns:
  # Start at the homepage.
  - navigate: "/loggedInHome"
  - wait: 1500

  # Click the support-chat launcher (Crisp/Brya support button).
  - click: "button[aria-label*='Support' i], button[aria-label*='chat with Brya' i], [class*='crisp' i]"
  - wait: 2000

  # Hit the browser back button.
  - back
  - wait: 2000

  # Expected: we're back on the homepage and it's loaded.
  - assert_url: "/loggedInHome"
  - assert_visible: "[placeholder='Talk to Sage']"
