name: "BRY-562: Slow chat performance - responses take too long"
description: |
  Status: Backlog — not yet fixed, failure is expected.
  Chat responses frequently take 10-15 seconds. Expected: within ~3 seconds.

tags: [bug, backlog, ui]

setup:
  admin_clear: true

turns:
  - send: "Hello"
    expect:
      - judge: "Sage responds in some reasonable way."
  - assert_response_within: 3000

  - send: "What is happening this week?"
    expect:
      - judge: "Sage responds with events or asks a clarifying question."
  - assert_response_within: 3000

  - send: "Tell me about upcoming events"
    expect:
      - judge: "Sage responds."
  - assert_response_within: 3000
