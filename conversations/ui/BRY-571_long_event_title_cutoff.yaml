name: "BRY-571: Event titles with long names get cut off instead of wrapping to new line"
description: |
  Status: Done — previously fixed, failure = regression.
  Event titles with long names should either wrap OR be truncated with a visible
  ellipsis. Bug: titles were cut off mid-word with no indication text was truncated.

tags: [bug, done, ui]

setup:
  fresh_chat: false

turns:
  - navigate: "/loggedInHome"
  - wait_for: "a[href*='/event/']"

  # The regression-free state allows long titles to wrap to a new line OR use
  # text-overflow: ellipsis. The bug was: white-space: nowrap + overflow: hidden +
  # text-overflow: clip → titles get cut mid-word with no indication.
  #
  # Simplest defensive check: the title element should allow wrapping
  # (white-space != nowrap). If the design uses nowrap + ellipsis, that's also OK,
  # but we'd need a separate assertion path for that combination.
  - assert_style:
      selector: "a[href*='/event/'] h3, a[href*='/event/'] [class*='title' i]"
      property: "white-space"
      not_equals: "nowrap"
