name: "BRY-571: Event titles with long names get cut off instead of wrapping to new line"
description: |
  Status: Done — previously fixed, failure = regression.
  Note: UI automation bug — steps describe browser actions, not chat messages. Requires UI harness extension to run fully.
  Events with long titles render with the title cut off mid-word on the Events page and Homepage, with no ellipsis or indicator that text is truncated.

tags: [bug, done, ui]

setup:
  fresh_chat: false

turns:
  - send: "Create a new event with an intentionally long title such as 'A Really Incredibly Long Community Event Title That Definitely Exceeds One Line On The Card'"
    expect:
      - judge: "The event creation should succeed and the new event should appear in listings. FAIL if event creation fails for reasons unrelated to this bug."

  - send: "Navigate to the Events page and locate the newly created event card"
    expect:
      - judge: "The event card on the Events page should display the full long title, either wrapped to multiple lines or truncated with a visible ellipsis ('...'). FAIL if the title is cut off mid-word with no ellipsis or visual indication that more text exists."

  - send: "Navigate to the logged-in Homepage and locate the same event in the feed"
    expect:
      - judge: "The event card on the Homepage should also wrap the long title to multiple lines or show an ellipsis to indicate truncation. FAIL if the title is cut off mid-word with no ellipsis and the full name is invisible to users."

  - send: "Compare the two views to ensure consistent truncation/wrapping behavior"
    expect:
      - judge: "Both the Events page and Homepage should show the long title in a user-understandable form (wrapped or ellipsis-truncated) — no raw mid-word cutoff. FAIL if either surface hides part of the title with no visual indication that text is truncated."
