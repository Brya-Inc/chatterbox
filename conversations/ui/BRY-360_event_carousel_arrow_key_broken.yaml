name: "BRY-360: Event carousel arrow key navigation broken — doesn't move between cards when focused"
description: |
  Status: Done — previously fixed, failure = regression.
  When an event card inside a carousel has focus, ArrowLeft/ArrowRight should move between
  cards. Regression: arrow keys scrolled the page instead of changing card focus.

tags: [bug, done, ui]

setup:
  admin_clear: true

turns:
  # Ask Sage for events — this should return a carousel (SuggestedEventsScroller).
  - send: "Show me events happening this week"
    expect:
      - judge: "Sage returns a carousel of event cards. FAIL if no events or carousel appears."

  # Click the first event card to give it keyboard focus.
  - click: ".cs-message-list a[href*='/event/']:first-of-type"
  - wait: 500

  # After clicking, the event link should have focus. Verify we're focused inside the carousel.
  - assert_focused: ".cs-message-list a[href*='/event/']"

  # Press ArrowRight — focus should move to the next card, not scroll the page.
  - press_key: "ArrowRight"
  - wait: 500

  # Still focused on an event card (not the document body / not lost).
  # In the regression, focus would stay on the original card or jump to the body.
  - assert_focused: "a[href*='/event/']"
