name: "BRY-357: Chat input unreachable via Tab — focus cycles through all messages first"
description: |
  Status: Done — previously fixed, failure = regression.
  Note: UI automation bug — steps describe browser actions, not chat messages. Requires UI harness extension to run fully.
  Tab order should reach chat input within 1-2 presses; old messages should not be in tab order.

tags: [bug, done, ui]

setup:
  fresh_chat: false

turns:
  - send: "Browser: open chat and ensure there is a long message history (20+ messages)."
    expect:
      - judge: "Chat is open with sufficient message history. FAIL if chat cannot be opened."
  - send: "Browser: click outside chat, then press Tab repeatedly and count presses until the chat input receives focus."
    expect:
      - judge: "Chat input receives focus within 1-2 Tab presses from the chat container. FAIL if Tab must cycle through 20+ old messages before reaching input."
  - send: "Browser: inspect tab order of chat message bubbles."
    expect:
      - judge: "Old message bubbles are not in the tab order (tabindex=-1 or non-focusable). FAIL if every historical message is a Tab stop."
