name: "BRY-357: Chat input unreachable via Tab — focus cycles through all messages first"
description: |
  Status: Done — previously fixed, failure = regression.
  Tab order should reach chat input within a few presses; old messages should not be Tab stops.

tags: [bug, done, ui]

setup:
  fresh_chat: false

turns:
  - navigate: "/loggedInHome"
  - wait_for: "[placeholder='Talk to Sage']"

  # Click on an innocuous body area to reset focus out of the chat input.
  - click: "body"
  - wait: 500

  # Tab a handful of times. Within 10 Tab presses the input should be focused —
  # before the regression, focus would have to cycle through 20+ message bubbles first.
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"

  # Within 10 Tabs, the chat input must be focused. FAIL if not.
  - assert_focused: "[placeholder='Talk to Sage']"
