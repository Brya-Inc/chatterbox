name: "BRY-111: Scroll failure limits event visibility to first 10 entries"
description: |
  Status: In Review — status unclear.
  Home page's infinite scroll doesn't trigger "load more" past 10 events, so any event
  beyond position 10 (which is date-sorted) is unreachable.

tags: [bug, in_review, ui]

setup:
  fresh_chat: false

turns:
  - navigate: "/loggedInHome"
  - wait_for: "a[href*='/event/']"
  - wait: 1000

  # Scroll to bottom repeatedly — each scroll should trigger more events to load.
  - scroll: { to: "bottom" }
  - wait: 2000
  - scroll: { to: "bottom" }
  - wait: 2000
  - scroll: { to: "bottom" }
  - wait: 2000

  # After scrolling, we need more than 10 event links in the DOM. FAIL if capped at 10.
  - assert_count: { selector: "a[href*='/event/']", at_least: 11 }
