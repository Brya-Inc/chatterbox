name: "BRY-111: Scroll failure limits event visibility to first 10 entries"
description: |
  Status: In Review — in_review
  Note: UI automation bug — steps describe browser actions, not chat messages. Requires UI harness extension to run fully.
  "Load more events" does not work on home page, capping visible events at 10 regardless of how many exist.

tags: [bug, in_review, ui]

setup:
  fresh_chat: false

turns:
  - send: "Navigate to the home page and scroll to the bottom of the event listing"
    expect:
      - judge: "Page should display a 'Load more events' button or trigger loading of additional events beyond the first 10. State: FAIL if only 10 events are visible and no further events can be loaded."

  - send: "Click or activate the 'Load more events' control at the bottom of the event list"
    expect:
      - judge: "Additional events beyond the initial 10 should load and appear in the list. State: FAIL if the event list remains capped at 10 entries and no new events appear after attempting to load more."

  - send: "Continue scrolling down past the newly loaded events to see if further events can be reached"
    expect:
      - judge: "User should be able to continue scrolling and loading events all the way to the last posted event. State: FAIL if scrolling stops loading new events before all events have been shown."
