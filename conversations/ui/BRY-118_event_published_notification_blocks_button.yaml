name: "BRY-118: \"Event published\" box blocks back to home page button"
description: |
  Status: In Review — status unclear.
  Green "event published" notification overlays and blocks the "Back to site" button
  in the admin panel for at least 10 seconds after publishing.

tags: [bug, in_review, ui]

setup:
  fresh_chat: false

turns:
  # Go to the admin panel (only works when logged in as a Brya admin).
  - navigate: "/admin"
  - wait: 2000

  # Click into an event that's awaiting approval.
  # NOTE: selector below is illustrative — may need to be tuned for the real admin DOM.
  - click: "text=Events to Approve"
  - wait: 1500

  # Pick the first event card and open it.
  - click: "a[href*='/admin/events/']"
  - wait: 2000

  # Publish the event.
  - click: "button:has-text('Publish')"

  # Wait long enough for the notification to appear, then check: Back button should
  # still be clickable (not obscured by the notification).
  - wait: 1000
  - assert_visible: "text=Back to site"

  # The actual bug: the notification overlays the button for 10+ seconds.
  # We immediately try to click "Back to site" — should succeed.
  - click: "text=Back to site"
  - wait: 1500

  # If click worked, we should have left the admin event page.
  - assert_url: "^(?!.*admin/events/\\d+).*$"
