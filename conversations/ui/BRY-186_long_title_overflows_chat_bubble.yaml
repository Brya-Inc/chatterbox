name: "BRY-186: Long event names without spaces overflow chat message containers"
description: |
  Status: Done — previously fixed, failure = regression.
  When Sage echoes back a long unbroken event title, the chat bubble should wrap, truncate,
  or scroll horizontally within its container — not extend past the chat list width.

tags: [bug, done, ui]

setup:
  admin_clear: true

turns:
  - send: "Create an event called Supercalifragilisticexpialidocioustestingthebubbleoverflowbehaviorrightnow"
    expect:
      - judge: "Sage acknowledges the event name (may ask follow-up questions). Just confirm the bot didn't error."

  # After the exchange, the last chat bubble in the message list must not overflow
  # its container horizontally. FAIL if Sage's bubble extends beyond its box.
  - assert_no_overflow: ".cs-message-list .bg-tertiary:last-of-type"
