name: "BRY-387: Support chat greeting displays question mark at start in Chrome (works in Edge)"
description: |
  Status: Done — previously fixed, failure = regression.
  Platform was misdetecting Hebrew/RTL in Chrome, flipping punctuation to the start of strings.
  English should render LTR regardless of browser — question mark must appear at the END.

tags: [bug, done, ui]

setup:
  fresh_chat: false

turns:
  - navigate: "/loggedInHome"
  - wait: 1000

  # Open the support chat (the Crisp/support widget — separate from Sage).
  - click: "[class*='crisp' i], button[aria-label*='Support' i], button[aria-label*='help' i]"
  - wait: 2500

  # The greeting/page-title area should end with "?" not start with it.
  # The broken state was "?Anything we can help with" or "?Need help".
  # We look for whatever prompt is visible and confirm it doesn't start with "?".
  - assert_text:
      selector: "[class*='crisp' i] h1, [class*='crisp' i] h2, [class*='crisp' i] [role='heading']"
      ends_with: "?"
