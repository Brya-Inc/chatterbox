name: "BRY-542: \"I want to go\" button overlaps with \"One more thing\" signup prompt creating visual clutter"
description: |
  Status: Backlog — not yet fixed, failure is expected.
  While logged out, clicking "I want to go" on an event page should hide that button
  while the signup modal is shown. Bug: the button remains visible and overlaps the modal.

  Note: this test runs against an event page as a NON-authenticated user. Since the harness
  currently always logs in, this test requires manual logout or an out-of-session navigation.
  For a simple proof-of-concept, this YAML asserts no overlap between any "I want to go"
  button and any visible dialog — will skip silently if the modal isn't open.

tags: [bug, backlog, ui]

setup:
  fresh_chat: false

turns:
  # Navigate to the event listings and pick one.
  - navigate: "/events"
  - wait_for: "a[href*='/event/']"
  - click: "a[href*='/event/']"
  - wait_for: "button:has-text('I want to go')"

  # Click the button to trigger the modal.
  - click: "button:has-text('I want to go')"
  - wait: 1500

  # Once the modal is up, check that the 'I want to go' button does NOT overlap it.
  # If the button is properly hidden, the button selector won't match and assert_no_overlap
  # will report "b_found=False" — which is the desired PASS state (no overlap because no button).
  # If the button is still visible AND overlaps the modal, we'll see overlapping=true.
  - assert_no_overlap:
      a: "button:has-text('I want to go')"
      b: "[role='dialog'], [class*='modal' i]"
