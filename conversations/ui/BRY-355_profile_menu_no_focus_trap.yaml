name: "BRY-355: Profile menu does not trap keyboard focus — Tab skips menu items"
description: |
  Status: Done — previously fixed, failure = regression.
  Resolved "By Design" per WAI-ARIA Menu pattern: arrow keys navigate menu items, Tab closes
  the menu. The regression test verifies arrow-key navigation works when the menu is open.

tags: [bug, done, ui]

setup:
  fresh_chat: false

turns:
  - navigate: "/loggedInHome"
  - wait: 1500

  # Open the profile menu by clicking the avatar/user button (top-right).
  - click: "button:has-text('Michael'), button:has-text('Mike'), button:has-text('Arianna')"
  - wait: 500

  # The profile menu should now be visible — verify by checking for an Admin or Logout option.
  - assert_visible: "text=Logout"

  # Per WAI-ARIA Menu pattern, ArrowDown moves focus to the next menu item.
  - press_key: "ArrowDown"
  - wait: 300

  # After ArrowDown, focus must be on SOME menu item (role=menuitem or similar).
  # FAIL if arrow key did nothing (the actual regression to catch).
  - assert_focused: "[role='menuitem'], [role='menu'] button, [role='menu'] a"
