name: "BRY-363: 'I want to go' button skipped in Tab order then returns"
description: |
  Status: Done — previously fixed, failure = regression.
  On an event detail page, the 'I want to go' button was previously skipped in Tab order
  (share button focused first, then focus returned to 'I want to go'). Tab order should
  match visual top-to-bottom layout.

tags: [bug, done, ui]

setup:
  fresh_chat: false

turns:
  # Navigate to any event detail page. Uses /events for the listing, then picks first event card.
  - navigate: "/events"
  - wait_for: "a[href*='/event/']"
  - click: "a[href*='/event/']"
  - wait_for: "button:has-text('I want to go')"

  # Focus the page body to reset Tab position, then Tab until we see either button.
  - click: "body"
  - wait: 500

  # Tab several times. The 'I want to go' button should land in focus BEFORE the share button
  # in the regression-free state. Exact Tab count depends on page layout, so we check focus
  # multiple times.
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"

  # Within 8 Tabs, 'I want to go' must have received focus. FAIL if it was skipped.
  # (In the regression, the share button would have been focused first and 'I want to go'
  # would only come after another Tab press.)
  - assert_focused: "button:has-text('I want to go')"
