name: "BRY-365: Tab order skips and jumps through event selection grid instead of following layout"
description: |
  Status: Done — previously fixed, failure = regression.
  On /lead-an-event, Tab should traverse event-type cards in row-by-row visual order.
  Regression: Tab skipped entire first row and jumped around unpredictably.

tags: [bug, done, ui]

setup:
  fresh_chat: false

turns:
  - navigate: "/lead-an-event"
  - wait: 2000

  # Focus a known element above the grid to reset Tab position.
  - click: "body"
  - wait: 300

  # Tab through the page — the event-type grid cards should be reachable.
  # We expect to reach AT LEAST one event-type card within 15 Tab presses.
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"
  - press_key: "Tab"

  # At least one event-type option (biking, coffee meetup, bowling, etc.) must be focusable.
  # FAIL if Tab skipped the entire grid and we're now below it.
  # NOTE: selector below is defensive — targets any button/link/role=button inside a grid container.
  - assert_focused: "[role='button'], button, a[href]"
