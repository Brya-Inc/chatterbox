name: "BRY-365: Tab order skips and jumps through event selection grid instead of following layout"
description: |
  Status: Done — previously fixed, failure = regression.
  Note: UI automation bug — steps describe browser actions, not chat messages. Requires UI harness extension to run fully.
  Tab must traverse the /lead-an-event grid row-by-row in visual order without skipping cards.

tags: [bug, done, ui]

setup:
  fresh_chat: false

turns:
  - send: "Browser: navigate to /lead-an-event and scroll to the event type grid (biking, coffee meetup, etc.)."
    expect:
      - judge: "Event type grid is rendered with multiple cards visible. FAIL if page or grid does not load."
  - send: "Browser: place focus above the grid and press Tab, recording the order cards receive focus."
    expect:
      - judge: "Tab visits every card in the grid in row-by-row left-to-right visual order. FAIL if the first row is skipped entirely, cards are visited out of order, or the grid is skipped to the bottom of the page (original bug)."
  - send: "Browser: verify no grid card is missed."
    expect:
      - judge: "Every event type card in the grid is reachable via Tab. FAIL if any card is unreachable."
