name: "BRY-146: Comment input box background turns black and hides text when scrolling down"
description: |
  Status: Done — previously fixed, failure = regression.
  On an event's Comments tab, typing text and scrolling down shouldn't change the input's
  background to black (which would hide the typed text).

tags: [bug, done, ui]

setup:
  fresh_chat: false

turns:
  - navigate: "/events"
  - wait_for: "a[href*='/event/']"
  - click: "a[href*='/event/']"
  - wait: 1500

  # Click the Comments tab.
  - click: "text=Comments"
  - wait: 1000

  # Focus the comment input and type something.
  - fill:
      selector: "textarea, input[type='text'][placeholder*='omment' i]"
      value: "Testing scroll-related bg regression"

  # Scroll the page down while the input is focused.
  - scroll: { to: "bottom" }
  - wait: 1000

  # The input's background should NOT be black (rgb(0,0,0) or #000).
  - assert_style:
      selector: "textarea, input[type='text'][placeholder*='omment' i]"
      property: "background-color"
      not_equals: "rgb(0, 0, 0)"
