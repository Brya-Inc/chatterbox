name: "BRY-570: Event created via chat does not appear in Admin 'Events to Approve' page"
description: |
  Status: Backlog — not yet fixed, failure is expected
  After creating an event via the chatbot and receiving confirmation that it is "in the review process," the event does not appear in the Admin → Events to Approve page. It may appear ~30 minutes later, but should be immediate.

tags: [bug, backlog, create]

setup:
  admin_clear: true

turns:
  - send: "I want to create an event called 'Watercolor Wednesday' on April 30th at 4pm with a capacity of 15."
    expect:
      - judge: "Bot should start or complete the event creation flow. FAIL if the bot refuses or errors."

  - send: "Yes, please submit it for review."
    expect:
      - judge: "Bot should confirm the event 'Watercolor Wednesday' has been submitted and is in the review process. FAIL if the bot does not confirm submission or says the event cannot be submitted."

  - send: "You said my event is in the review process. Will it appear immediately in the admin approval queue, or is there a delay?"
    expect:
      - judge: "Bot should indicate that the event should appear immediately or very soon in the admin approval queue. FAIL if the bot says there will be a significant delay (e.g., 30 minutes or more) or is unable to provide any information about when the admin will see the event — a long delay is the bug being tested."
