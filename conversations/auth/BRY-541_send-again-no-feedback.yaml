name: "BRY-541: \"Send again\" button provides no feedback when clicked - unclear if email was resent"
description: |
  Status: Backlog — not yet fixed, failure is expected.
  On the magic link confirmation page, clicking "Send again" gives no visual feedback.
  This test verifies (1) the button actually triggers a new email (via the test endpoint)
  and (2) there's some visible feedback after clicking. Visual feedback check is partial —
  we can detect text changes but not animations/loading spinners.

tags: [bug, backlog, auth]

setup:
  fresh_chat: false

turns:
  # Log out and trigger a fresh magic link flow with a password-less account.
  - clear_cookies
  - navigate: "/login"
  - wait_for: "[placeholder='Enter email address']"
  - fill:
      selector: "[placeholder='Enter email address']"
      value: "admin@dev.brya.com"
  - press_key: "Enter"
  - wait: 3000

  # Verify we're on the email confirmation page.
  - assert_url: "(email-confirmation|Welcome)"

  # Confirm the first magic link was generated.
  - fetch_magic_link:
      email: "admin@dev.brya.com"
      store_as: "link1"

  # Before clicking, verify the "Send again" button is visible and enabled.
  - assert_visible: "button:has-text('Send again')"

  # Click "Send again" to request a new email.
  - click: "button:has-text('Send again')"
  - wait: 3000

  # Check that a new magic link was generated — proves the button actually did something.
  - fetch_magic_link:
      email: "admin@dev.brya.com"
      store_as: "link2"

  # After clicking, the page should show NEW feedback that wasn't there before.
  # The original page already says "We've sent an email..." — so we look for
  # words that would ONLY appear after a resend: "resent", "again", "new email".
  # FAIL if none of these appear — that's the bug (no feedback at all).
  # Using judge here since the exact wording is unpredictable.
  - assert_text:
      selector: "body"
      contains: "resent"
