name: "BRY-531: \"Continue\" button on login page unresponsive - does not proceed to password/magic link page"
description: |
  Status: Backlog — not yet fixed, failure is expected.
  Entering an email on /login and clicking Continue (or pressing Enter) produces no response —
  no loading state, no error, and no navigation — leaving the user stuck on the email entry screen.

tags: [bug, backlog, auth]

setup:
  fresh_chat: false

turns:
  - navigate: "/login"
  - wait_for: "[placeholder='Enter email address']"

  - fill:
      selector: "[placeholder='Enter email address']"
      value: "test-nonexistent-user@example.com"

  - click: "text=\"Continue\""
  - wait: 3000

  # FAIL if we're still stuck on the original /login email-entry page.
  - assert_url: "(email-confirmation|password|postLogin)"
