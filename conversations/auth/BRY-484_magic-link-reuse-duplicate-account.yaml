name: "BRY-484: Magic links can be reused to create duplicate accounts and permanently break authentication for that email"
description: |
  Status: Backlog — not yet fixed, failure is expected.
  Magic links should be single-use. Bug: the same link URL accepted in two different tabs
  creates two parallel sessions for the same email.

tags: [bug, backlog, auth]

setup:
  fresh_chat: false

turns:
  # Log out so we can trigger a fresh magic-link login flow.
  - clear_cookies
  - navigate: "/login"
  - wait: 1500
  - wait_for: "[placeholder='Enter email address']"

  # Submit a password-less email to trigger magic link generation.
  - fill:
      selector: "[placeholder='Enter email address']"
      value: "admin@dev.brya.com"
  - press_key: "Enter"
  - wait: 3000

  # Fetch the generated magic link from the test endpoint.
  - fetch_magic_link:
      email: "admin@dev.brya.com"
      store_as: "link"

  # Step 1: Use the link in Tab 1 (default). Should log the user in.
  - navigate: "$link"
  - wait: 4000
  # The link was accepted if we landed anywhere authenticated (home, postLogin,
  # set-password, onboarding, etc.) — NOT back on /login or an error page.
  - assert_url: "(loggedInHome|postLogin|set-password|/$)"

  # Step 2: Open a second tab and reuse the SAME link URL.
  # Regression-free: link should be rejected (single-use, already consumed).
  # Bug: replay succeeds and creates another session.
  - open_tab: "replay"
  - navigate: "$link"
  - wait: 4000

  # On the replay tab, the replayed link should be rejected. We should NOT land
  # on an authenticated page. FAIL if we reach set-password, loggedInHome, or
  # postLogin — that means the link was accepted twice (the bug).
  - assert_url: "(error|expired|used|invalid|/login|email-confirmation)"
