name: "BRY-560: Tab key skips X, Continue, Back, and Login buttons on login page"
description: |
  Status: Backlog — not yet fixed, failure is expected.
  On /login, pressing Tab should reach the Continue button (among others). Bug: Tab key
  skips it entirely, making it unreachable via keyboard.

tags: [bug, backlog, auth]

setup:
  fresh_chat: false

turns:
  - navigate: "/login"
  - wait_for: "[placeholder='Enter email address']"

  # Put a valid email into the input so Continue is actionable.
  - fill:
      selector: "[placeholder='Enter email address']"
      value: "test@example.com"

  # The email input is focused after fill. Tab once — should land on Continue.
  - press_key: "Tab"

  # The Continue button should now have focus. If Tab skipped it, this will FAIL.
  - assert_focused: "button:has-text('Continue')"
