name: "BRY-469: Login with .co domain typo shows password page then creates duplicate account"
description: |
  Status: Backlog — not yet fixed, failure is expected.
  Entering a .co typo of a valid .com address incorrectly shows the password page
  instead of rejecting the unknown email or sending a magic link.

tags: [bug, backlog, auth]

setup:
  fresh_chat: false

turns:
  - clear_cookies
  - navigate: "/login"
  - wait_for: "[placeholder='Enter email address']"

  # Enter the typo email: .co instead of .com
  - fill:
      selector: "[placeholder='Enter email address']"
      value: "admin@dev.brya.co"
  - press_key: "Enter"
  - wait: 3000

  # The platform should NOT show a password page for this typo email.
  # Expected: error message, magic link confirmation, or "email not found".
  # Bug: it shows /login/password as if the email is valid.
  - assert_url: "^(?!.*/login/password).*$"
