name: "BRY-487: Closing login modal redirects to Events page while logged out instead of returning to login"
description: |
  Status: Backlog — not yet fixed, failure is expected.
  Clicking X to close the login modal intermittently redirects the user to the Events page while still logged out,
  instead of returning to the main Login/Signup page.

tags: [bug, backlog, auth]

setup:
  fresh_chat: false

turns:
  - navigate: "/login"
  - wait_for: "[placeholder='Enter email address']"
  - assert_visible: "[placeholder='Enter email address']"

  # Close the login modal (X button — typical aria-label)
  - click: "button[aria-label='Close']"
  - wait: 1500

  # BUG: the URL should land on / or /login. FAIL if it lands on /events.
  - assert_url: "(/login|/)$"
