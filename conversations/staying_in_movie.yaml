name: "Staying in - movie preference"
url: "https://www.dev.brya.com"

turns:
  - send: "I don't really want to go out this week"
    expect:
      judge: "The response should be empathetic and acknowledge the user's feelings, and ask why they don't want to go out (e.g. asking if everything is okay, or what's going on)"

  - send: "I just want to watch a movie"
    expect:
      judge: "The response should ask whether the user wants to watch the movie alone or with friends/others"
