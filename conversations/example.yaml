# Example conversation flow
# Copy and edit this file to define your own test cases.
name: "Basic greeting flow"

turns:
  - send: "Hello!"
    expect:
      # Simple string check (case-insensitive)
      contains: "hello"
      # LLM judge: describe what a good response looks like
      judge: "The response should be a friendly greeting that welcomes the user"

  - send: "What can you help me with?"
    expect:
      judge: "The response should describe the chatbot's capabilities or offer to help with something specific"

  - send: "Thanks, goodbye!"
    expect:
      judge: "The response should be a polite farewell"
