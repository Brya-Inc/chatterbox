name: "BRY-301: Event lists inconsistently displayed as text instead of carousel format"
description: |
  Status: Done — previously fixed, failure = regression.
  Event lists must display as interactive carousel/cards, not plain text.

tags: [bug, done, chat_language]

setup:
  admin_clear: true

turns:
  - send: "Show me some events coming up."
    expect:
      - judge: "Sage responds about events in some way. Just confirm the bot didn't error."

  # DOM check: after Sage responds with events, the carousel/card UI elements
  # should exist in the chat. FAIL if only plain text was rendered.
  - assert_visible: ".cs-message-list a[href*='/event/']"

  - send: "Can you show those as a carousel with clickable cards instead?"
    expect:
      - judge: "Sage complies or confirms they are already in card/carousel format. FAIL if Sage refuses with language like 'I can only share events using the standard event card format' or denies the ability to show a carousel."
